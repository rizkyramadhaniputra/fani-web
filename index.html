<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Question 💕</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

/* Container */
.container {
    color: white;
}

/* Title */
h1 {
    font-size: 50px;
}

/* Buttons */
.buttons {
    margin-top: 30px;
}

button {
    padding: 15px 35px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

/* YES */
.yes {
    background: hotpink;
    color: white;
}

/* NO */
.no {
    background: white;
    color: hotpink;
    position: relative;
}

/* Response */
#response {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: hotpink;
    padding: 25px;
    border-radius: 15px;
    font-size: 25px;
    transition: 0.4s;
}

#response.show {
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<div class="container">
    <h1>💕 Will You Be My Girlfriend? 💕</h1>
    <p>Kamu mau jadi pacar aku nggak? 💖</p>

    <div class="buttons">
        <button class="yes" onclick="jawab('yes')">YES 💖</button>
        <button class="no" id="noBtn">NO 😆</button>
    </div>
</div>

<div id="response"></div>

<script>
// Ambil elemen
const noBtn = document.getElementById('noBtn');
const response = document.getElementById('response');
const yesBtn = document.querySelector('.yes');

// Fungsi tombol YES
function jawab(type) {
    response.classList.add('show');

    if (type === 'yes') {
        response.innerHTML = "YAY! 💕 Kamu sekarang pacarku 😆💖";
    }

    setTimeout(() => {
        response.classList.remove('show');
    }, 3000);
}

// Fungsi tombol NO kabur
noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.position = 'absolute';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    // Bonus: tombol YES membesar 😏
    let size = parseFloat(window.getComputedStyle(yesBtn).fontSize);
    yesBtn.style.fontSize = (size + 2) + 'px';
});
</script>

</body>
</html>
